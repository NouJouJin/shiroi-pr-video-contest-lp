<body data-page="gallery">

<!-- ===== ヘッダーナビ ===== -->
<header class="gl-header">
  <div class="gl-header__inner">
    <a href="/SHIROI.html" class="gl-header__logo">白井市PR動画コンテスト</a>
    <nav class="gl-nav">
      <a href="/SHIROI.html" class="gl-nav__link">コンテストTOP</a>
      <a href="/gallery" class="gl-nav__link is-current" aria-current="page">作品ギャラリー</a>
      <a href="#" class="gl-nav__link is-disabled" aria-disabled="true" title="準備中">受賞作品（Coming Soon）</a>
    </nav>
  </div>
</header>

<!-- ===== ヒーロー（ミニ） ===== -->
<section class="gl-hero">
  <div class="container">
    <p class="gl-hero__eyebrow">GALLERY</p>
    <h1 class="gl-hero__title">応募作品ギャラリー</h1>
    <p class="gl-hero__lead">クリエイターたちが描く、白井市の暮らし。<br />気になる作品をクリックして、想いと映像をお楽しみください。</p>
  </div>
</section>

<!-- ===== 作品グリッド ===== -->
<main class="gl-main">
  <div class="container">
    <div class="gl-meta" id="gl-meta" aria-live="polite">読み込み中…</div>
    <div class="gl-grid" id="gl-grid"></div>
    <div class="gl-empty" id="gl-empty" hidden>
      <p>まだ作品が登録されていません。</p>
    </div>
  </div>
</main>

<!-- ===== モーダル ===== -->
<div class="gl-modal" id="gl-modal" role="dialog" aria-modal="true" aria-labelledby="gl-modal-title" hidden>
  <div class="gl-modal__backdrop" data-close></div>
  <div class="gl-modal__panel" role="document">
    <div class="gl-modal__topbar">
      <button class="gl-modal__back" type="button" data-close>← 一覧へ戻る</button>
      <button class="gl-modal__close" type="button" data-close aria-label="閉じる">×</button>
    </div>
    <div class="gl-modal__player">
      <iframe id="gl-modal-iframe" src="" title="YouTube動画" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen loading="lazy"></iframe>
    </div>
    <div class="gl-modal__body">
      <h2 class="gl-modal__title" id="gl-modal-title"></h2>
      <p class="gl-modal__creator" id="gl-modal-creator"></p>
      <div class="gl-modal__pager">
        <button class="gl-modal__pager-btn" id="gl-modal-prev" type="button">← 前の作品</button>
        <button class="gl-modal__pager-btn" id="gl-modal-next" type="button">次の作品 →</button>
      </div>
      <div class="gl-modal__message-wrap">
        <h3 class="gl-modal__heading">クリエイターの想い</h3>
        <p class="gl-modal__message" id="gl-modal-message"></p>
      </div>

      <details class="gl-modal__details" id="gl-modal-details">
        <summary class="gl-modal__details-summary">
          <span class="gl-modal__details-label">制作の詳細を見る</span>
          <span class="gl-modal__details-icon" aria-hidden="true"></span>
        </summary>
        <div class="gl-modal__details-body">
          <section class="gl-modal__detail-item" id="gl-modal-full-message-wrap" hidden>
            <h4 class="gl-modal__detail-heading">作品コンセプト</h4>
            <p class="gl-modal__detail-text" id="gl-modal-full-message"></p>
          </section>
          <section class="gl-modal__detail-item" id="gl-modal-process-wrap" hidden>
            <h4 class="gl-modal__detail-heading">制作プロセスの工夫</h4>
            <p class="gl-modal__detail-text" id="gl-modal-process"></p>
          </section>
          <section class="gl-modal__detail-item" id="gl-modal-ai-wrap" hidden>
            <h4 class="gl-modal__detail-heading">使用した生成AI</h4>
            <ul class="gl-modal__detail-list" id="gl-modal-ai-tools"></ul>
          </section>
          <section class="gl-modal__detail-item" id="gl-modal-music-wrap" hidden>
            <h4 class="gl-modal__detail-heading">音源提供</h4>
            <p class="gl-modal__detail-text" id="gl-modal-music"></p>
          </section>
          <section class="gl-modal__detail-item gl-modal__detail-item--comment" id="gl-modal-comment-wrap" hidden>
            <h4 class="gl-modal__detail-heading">クリエイターからのコメント</h4>
            <p class="gl-modal__detail-text" id="gl-modal-comment"></p>
          </section>
        </div>
      </details>

      <div class="gl-modal__actions">
        <button class="gl-like" id="gl-modal-like" type="button">
          <span class="gl-like__icon" aria-hidden="true">♥</span>
          <span class="gl-like__count" id="gl-modal-like-count">0</span>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ===== フッター ===== -->
<footer class="gl-footer">
  <p>© 2026 Metagri研究所 presents 白井市PR動画コンテスト</p>
  <p><a href="/SHIROI.html">コンテストトップに戻る</a></p>
</footer>

</body>
</html>
